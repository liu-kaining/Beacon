name: Beacon Pipeline

on:
  schedule:
    - cron: '0 */8 * * *'  # Every 8 hours
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  run-beacon:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t beacon-app .

      - name: Run pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}
        run: |
          docker run \
            -e OPENAI_API_KEY \
            -e OPENAI_BASE_URL \
            -e R2_ACCESS_KEY_ID \
            -e R2_SECRET_ACCESS_KEY \
            -e R2_ENDPOINT_URL \
            -e R2_BUCKET_NAME \
            -e R2_PUBLIC_DOMAIN \
            -v ${{ github.workspace }}/data:/app/data \
            -v ${{ github.workspace }}/docs:/app/docs \
            beacon-app

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "beacon: auto-update data and site"
          file_pattern: "data/*.json docs/*.html"
